name: Build and Deploy GitHub Pages

on:
  push:
    branches: [ gh-pages ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # --- Setup Node.js for Marp ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      # --- Build Marp Slides ---
      - name: Build Marp Slides
        run: |
          mkdir -p ._marp_output/Helpers/Slides
          mkdir -p ._marp_output/Records/Slides
          marp ".pages/Helpers/Slides/slides.md" -o "._marp_output/Helpers/Slides/slides.html"
          marp ".pages/Records/Slides/slides.md" -o "._marp_output/Records/Slides/slides.html"

      # --- Setup Ruby for Jekyll ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Jekyll
        run: gem install jekyll jekyll-theme-modernist

      # --- Prepare and Build Jekyll Site ---
      - name: Build Jekyll Site
        run: |
          mkdir -p _jekyll_src/Helpers/Slides
          mkdir -p _jekyll_src/Records/Slides
          
          # Inject Front Matter to index.md (This forces Jekyll to render it)
          cp .pages/index.md _jekyll_src/index.md
          
          # Inject Front Matter to Memos
          cp .pages/Helpers/index.md _jekyll_src/Helpers/index.md
          cp .pages/Records/index.md _jekyll_src/Records/index.md
          
          # Copy config and Marp HTML
          cp .pages/_config.yml _jekyll_src/
          cp -r ._marp_output/* _jekyll_src/
          
          # Run Jekyll
          jekyll build -s _jekyll_src -d _site

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5